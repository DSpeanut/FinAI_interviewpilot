name: Morning Digest

on:
  schedule:
    - cron: "0 7 * * *"    # 8am BST (UTC+1) / 7am GMT (UTC+0)
    - cron: "0 17 * * *"   # 6pm BST (UTC+1) / 5pm GMT (UTC+0)
  workflow_dispatch:         # manual trigger for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r apps/digest/requirements.txt

      - name: Run digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
        run: python apps/digest/run.py

      - name: Commit updated state and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/digest/state.json apps/digest/data/history.jsonl
          git diff --cached --quiet || git commit -m "chore: update digest state [skip ci]"
          git push
